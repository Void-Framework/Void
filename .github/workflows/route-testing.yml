name: Route Testing

permissions:
  checks: write
  contents: read

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle Wrapper (best-effort)
        uses: gradle/wrapper-validation-action@v2
        continue-on-error: true

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run Tests (with simple retry)
        run: |
          set -e
          for i in 1 2 3; do
            ./gradlew --no-daemon clean test && break || {
              echo "Gradle failed (attempt $i). Retrying in 10s..."
              sleep 10
            }
          done

      - name: Show test results tree (for debugging)
        if: always()
        run: |
          echo "Listing test results..."
          ls -R test/build/test-results || true
          ls -R test/build/reports/tests || true

      - name: Upload Test Results (XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-xml
          path: test/build/test-results/test/
          if-no-files-found: warn

      - name: Upload Test Report (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-html
          path: test/build/reports/tests/test/
          if-no-files-found: warn

      - name: Generate Test Report
        if: always() && hashFiles('test/build/test-results/test/*.xml') != ''
        uses: dorny/test-reporter@v2
        with:
          name: JUnit Tests
          path: test/build/test-results/test/*.xml
          reporter: java-junit
          fail-on-error: true