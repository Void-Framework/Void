name: deploy-test

on:
  push:
    branches: [ "deploy-test" ]

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run a multi-line script
        run: |
          mvn clean package
          cd target/
          java -jar void-framework-0.5.jar
